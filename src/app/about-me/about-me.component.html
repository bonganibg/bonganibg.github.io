<main>

  <section class="about-me-page-container" *ngFor="let about of aboutMe">

    <!-- Section heading -->
    <div class="section-container">
      <h2 class="about-heading">
        {{about.About.heading}}
      </h2>


      <!-- About me lists -->
      <ul class="about-me-section" *ngFor="let info of about.About.sections">
        <!-- INDI ITEM -->
        <li>
          <div class="about-me-container">
            <!-- Line on the side of the list item -->
            <div class="line">
              <p>
                &#9899;
              </p>
            </div>

            <!-- Text Content -->
              <div class="text-content">
                <!-- Section Header -->
                <h3 class="section-header">
                  {{info.Heading}}
                </h3>

                <!-- Information -->
                <p class="information">
                  {{info.Content}}
                </p>
              </div>
          </div>
        </li>
      </ul>

    </div>


  </section>


</main>
