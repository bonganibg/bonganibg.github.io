<main>
  <section class="hero-section">

    <!-- Text information -->
    <div class="hero-text">
      <h2 class="hero-heading" [innerHTML]="headerData.Text.heading">
        {{headerData.Text.heading}}
      </h2>
      <p class="hero-about">
        {{headerData.Text.summary}}
      </p>

      <a href="/projects" class="view-projects">
        projects &rarr;
      </a>
    </div>


    <!-- Big Logo and links -->
    <div class="hero-logo-links">

      <!-- LOGO image -->
      <img src="{{headerData.Logo}}" alt="" class="hero-logo-big scroll">


      <div class="hero-background-item ">
        <svg viewBox="0 0 2235 2235" fill="none">
          <circle cx="1117.5" cy="1117.5" r="1117.5" fill="white"/>
        </svg>

      </div>

      <!-- External links -->
      <ul class="hero-social-links">
        <!-- LinkedIn -->
        <li>
          <a href="{{headerData.SocialOne.link}}">
            <img src="{{headerData.SocialOne.image}}" alt="">
          </a>
        </li>

        <!-- GitHub -->
        <li class="scroll">
          <a href="{{headerData.SocialTwo.link}}">
            <img src="{{headerData.SocialTwo.image}}" alt="">
          </a>
        </li>

        <!-- Instagram -->
        <li>
          <a href="{{headerData.SocialThree.link}}">
            <img src="{{headerData.SocialThree.image}}" alt="">
          </a>
        </li>
      </ul>

    </div>
  </section>


  <app-skills [skillsData]="skillsData"></app-skills>


  <section class="featured-projects-header">
    <!-- Featured projects header -->
    <div class="featured-projects-content">
      <h2 class="header-featured">
        Featured Projects
      </h2>

      <!-- Featured projects description -->
      <p class="description-featured">
        Here are some projects which I have recently finished or that I am still working on
      </p>
    </div>

  </section>



<app-featured-projects [projects]="projects"></app-featured-projects>


<section class="divider">
